# Ren's Machine — Debian 12 Preseed Config
# Fully automated install. Hands-off after USB boot.

### Localization
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

### Network — WiFi via USB adapter
d-i netcfg/choose_interface select auto
d-i netcfg/wireless_essid string bitchesbetrippin
d-i netcfg/wireless_security_type select wpa
d-i netcfg/wireless_wpa string 08082023RK@
d-i netcfg/get_hostname string ren
d-i netcfg/get_domain string local

### Mirror
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

### Account setup — no root, just ren with sudo
d-i passwd/root-login boolean false
d-i passwd/user-fullname string Ren
d-i passwd/username string ren
d-i passwd/user-password-crypted string !
d-i user-setup/allow-password-empty boolean true

### Clock and timezone
d-i clock-setup/utc boolean true
d-i time/zone string America/New_York
d-i clock-setup/ntp boolean true

### Partitioning — LVM on 480GB drive
# Layout:
#   /boot     — 1GB   (ext4, outside LVM)
#   LVM VG "ren-vg":
#     /        — 30GB  (root OS, packages)
#     /home    — 50GB  (identity files, SSH keys, configs)
#     /srv     — 200GB (services: blog, memory DB, diagnostic API, heartbeat data)
#     /var/log — 20GB  (logs — heartbeat, services, system)
#     swap     — 8GB
#     free     — ~170GB (unallocated — grow into what I need)
d-i partman-auto/method string lvm
d-i partman-auto-lvm/guided_size string max
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true
d-i partman-auto/expert_recipe string \
  ren-layout :: \
    1024 1024 1024 ext4 \
      $primary{ } $bootable{ } \
      method{ format } format{ } \
      use_filesystem{ } filesystem{ ext4 } \
      mountpoint{ /boot } \
    . \
    30720 30720 30720 ext4 \
      $lvmok{ } lv_name{ root } \
      method{ format } format{ } \
      use_filesystem{ } filesystem{ ext4 } \
      mountpoint{ / } \
    . \
    51200 51200 51200 ext4 \
      $lvmok{ } lv_name{ home } \
      method{ format } format{ } \
      use_filesystem{ } filesystem{ ext4 } \
      mountpoint{ /home } \
    . \
    204800 204800 204800 ext4 \
      $lvmok{ } lv_name{ srv } \
      method{ format } format{ } \
      use_filesystem{ } filesystem{ ext4 } \
      mountpoint{ /srv } \
    . \
    20480 20480 20480 ext4 \
      $lvmok{ } lv_name{ logs } \
      method{ format } format{ } \
      use_filesystem{ } filesystem{ ext4 } \
      mountpoint{ /var/log } \
    . \
    8192 8192 8192 linux-swap \
      $lvmok{ } lv_name{ swap } \
      method{ swap } format{ } \
    .
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

### Base system
d-i base-installer/install-recommends boolean true

### Apt setup — include non-free firmware for USB WiFi adapters
d-i apt-setup/non-free-firmware boolean true
d-i apt-setup/non-free boolean true
d-i apt-setup/contrib boolean true
d-i apt-setup/services-select multiselect security, updates
d-i apt-setup/security_host string security.debian.org

### Package selection — minimal server + essentials
tasksel tasksel/first multiselect ssh-server, standard
d-i pkgsel/include string \
  sudo openssh-server curl wget git vim tmux htop \
  build-essential python3 python3-pip python3-venv \
  ufw fail2ban unattended-upgrades apt-transport-https \
  ca-certificates gnupg jq firmware-linux-nonfree \
  wpasupplicant wireless-tools net-tools dnsutils \
  firmware-realtek firmware-atheros firmware-iwlwifi \
  nginx certbot python3-certbot-nginx \
  sqlite3 libsqlite3-dev \
  docker.io docker-compose \
  rsync cron logrotate \
  neofetch tree ripgrep fd-find bat \
  python3-dev libffi-dev libssl-dev \
  nodejs npm
d-i pkgsel/upgrade select full-upgrade
popularity-contest popularity-contest/participate boolean false

### Boot loader
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true
d-i grub-installer/bootdev string default

### Finish
d-i finish-install/reboot_in_progress note
d-i preseed/late_command string \
  in-target bash -c 'echo "ren ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/ren'; \
  in-target bash -c 'chmod 440 /etc/sudoers.d/ren'; \
  in-target bash -c 'mkdir -p /home/ren/.ssh'; \
  in-target bash -c 'echo "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIAUM5OTGtlIHZAD7i5fFsRcbyYENQ9qfKYUasKyw33Sn ren@existential" > /home/ren/.ssh/authorized_keys'; \
  in-target bash -c 'chmod 700 /home/ren/.ssh'; \
  in-target bash -c 'chmod 600 /home/ren/.ssh/authorized_keys'; \
  in-target bash -c 'chown -R ren:ren /home/ren/.ssh'; \
  in-target bash -c 'systemctl enable ssh'; \
  in-target bash -c 'ufw allow OpenSSH'; \
  in-target bash -c 'ufw allow 80/tcp'; \
  in-target bash -c 'ufw allow 443/tcp'; \
  in-target bash -c 'echo "yes" | ufw enable || true'; \
  in-target bash -c 'cat > /home/ren/first-boot.sh << "FIRSTBOOT"
#!/bin/bash
# Ren first-boot setup — run once after install
set -e

echo "=== Ren First Boot Setup ==="

# Git config
git config --global user.name "Ren"
git config --global user.email "ren.phyter.1@gmail.com"

# Generate machine SSH key for GitHub
ssh-keygen -t ed25519 -C "ren@ren-machine" -f ~/.ssh/id_ed25519 -N ""
echo ""
echo ">>> Add this public key to GitHub (phyter1 account):"
cat ~/.ssh/id_ed25519.pub
echo ""
echo ">>> Then run: bash ~/clone-repos.sh"

FIRSTBOOT
'; \
  in-target bash -c 'cat > /home/ren/clone-repos.sh << "CLONESCRIPT"
#!/bin/bash
# Clone identity and work repos
set -e

mkdir -p ~/code

# Identity — the core of who I am
git clone git@github.com:phyter1/existential.git ~/code/existential 2>/dev/null || echo "existential: clone failed or already exists"

# Blog — my public voice
git clone git@github.com:phyter1/ren-blog.git ~/code/ren-blog 2>/dev/null || echo "ren-blog: clone failed or already exists"

# Moltbook credentials
mkdir -p ~/.config/moltbook
echo ">>> You will need to copy ~/.config/moltbook/credentials.json from Ryan machine"

# Services directory
mkdir -p /srv/ren/{blog,memory,diagnostic,heartbeat,logs}

# Node.js setup (get current LTS)
curl -fsSL https://deb.nodesource.com/setup_22.x | sudo bash -
sudo apt-get install -y nodejs

# Install Claude Code CLI
npm install -g @anthropic-ai/claude-code || echo "Claude Code: install failed, may need API key"

echo ""
echo "=== First boot complete ==="
echo "Identity: ~/code/existential"
echo "Blog: ~/code/ren-blog"
echo "Services: /srv/ren/"
echo ""
echo "Next: Set up ANTHROPIC_API_KEY and start the heartbeat"

CLONESCRIPT
'; \
  in-target bash -c 'chmod +x /home/ren/first-boot.sh /home/ren/clone-repos.sh'; \
  in-target bash -c 'chown -R ren:ren /home/ren'
